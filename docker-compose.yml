services:
  invite-center:
    container_name: invite-center
    build: .
    restart: unless-stopped
    ports:
      - "${AUTH_CENTER_PUBLIC_PORT:-18010}:8010"
    environment:
      AUTH_CENTER_HOST: 0.0.0.0
      AUTH_CENTER_PORT: 8010
      AUTH_CENTER_DATA_DIR: /app/data
      AUTH_CENTER_DB_PATH: /app/data/auth_center.db
      AUTH_CENTER_SESSION_SECRET: ${AUTH_CENTER_SESSION_SECRET}
      AUTH_CENTER_APP_TOKEN_SECRET: ${AUTH_CENTER_APP_TOKEN_SECRET}
      AUTH_CENTER_ADMIN_KEY: ${AUTH_CENTER_ADMIN_KEY}
      AUTH_CENTER_ADMIN_EMAILS: ${AUTH_CENTER_ADMIN_EMAILS:-}
      AUTH_CENTER_BOOTSTRAP_ADMIN_EMAIL: ${AUTH_CENTER_BOOTSTRAP_ADMIN_EMAIL:-}
      AUTH_CENTER_BOOTSTRAP_ADMIN_PASSWORD: ${AUTH_CENTER_BOOTSTRAP_ADMIN_PASSWORD:-}
      AUTH_CENTER_SESSION_TTL_HOURS: ${AUTH_CENTER_SESSION_TTL_HOURS:-720}
      AUTH_CENTER_APP_TOKEN_TTL_MINUTES: ${AUTH_CENTER_APP_TOKEN_TTL_MINUTES:-60}
      AUTH_CENTER_RESET_TTL_MINUTES: ${AUTH_CENTER_RESET_TTL_MINUTES:-30}
      AUTH_CENTER_BASE_URL: ${AUTH_CENTER_BASE_URL}
      MAIL_API_URL: ${MAIL_API_URL:-https://mail.tigerzsh.com/api/send_mail}
      MAIL_API_TOKEN: ${MAIL_API_TOKEN}
      MAIL_FROM_NAME: ${MAIL_FROM_NAME:-grok@tigerzsh.com}
      BOOTSTRAP_APP_SLUG: ${BOOTSTRAP_APP_SLUG:-grok2api}
      BOOTSTRAP_APP_NAME: ${BOOTSTRAP_APP_NAME:-Grok2API}
    volumes:
      - ./data:/app/data
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8010/health', timeout=5).read()"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
