<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>App Callback Template</title>
  <style>
    body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#f7f7f5;color:#111;margin:0}
    .wrap{min-height:100vh;display:flex;align-items:center;justify-content:center;padding:24px}
    .card{width:min(520px,100%);background:#fff;border:1px solid #e9e9e5;border-radius:18px;padding:24px;box-shadow:0 18px 60px rgba(0,0,0,.06)}
    .title{font-size:28px;font-weight:700;margin-bottom:8px}
    .sub{font-size:13px;color:#666;line-height:1.6}
    .flash{margin-top:14px;padding:10px 12px;border-radius:10px;background:#f1f5ff;color:#1d4ed8;font-size:12px}
    .flash.error{background:#fef2f2;color:#b91c1c}
  </style>
</head>
<body>
  <main class="wrap">
    <section class="card">
      <div class="title">正在完成登录</div>
      <div class="sub">该页面是业务 App 的通用 callback 模板。它会从 URL hash 中读取 access_token，再交给你自己的后端换取业务会话。</div>
      <div id="flash" class="flash">处理中...</div>
    </section>
  </main>

  <script>
    const flash = document.getElementById('flash');

    function show(text, error = false) {
      flash.textContent = text;
      flash.className = `flash${error ? ' error' : ''}`;
    }

    async function run() {
      const hash = new URLSearchParams(location.hash.startsWith('#') ? location.hash.slice(1) : location.hash);
      const accessToken = (hash.get('access_token') || '').trim();

      if (!accessToken) {
        show('缺少 access_token，无法完成登录。', true);
        return;
      }

      try {
        const res = await fetch('/api/auth/exchange', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ access_token: accessToken }),
        });

        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.error || data.detail || '换取业务会话失败');

        // 成功后立即清理地址栏，避免 token 长留在浏览器中
        history.replaceState(null, '', '/');

        // 这里改成你的业务首页
        location.href = '/';
      } catch (err) {
        show(err.message || '登录失败', true);
      }
    }

    run();
  </script>
</body>
</html>
