<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Invite Center - 忘记密码</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <main class="auth-shell">
    <section class="auth-card">
      <div class="title">忘记密码</div>
      <div class="sub">输入邮箱后，若账户存在，系统会发送密码重置邮件。</div>
      <div id="flash" class="flash"></div>
      <div class="grid">
        <div class="row">
          <label>邮箱</label>
          <input id="email" type="email" placeholder="you@example.com" />
        </div>
        <button id="submitBtn">发送重置邮件</button>
      </div>
      <div class="sub" style="margin-top:14px">
        <a class="link" id="loginLink" href="/login">返回登录</a>
      </div>
    </section>
  </main>
  <script>
    const params = new URLSearchParams(location.search);
    const appSlug = (params.get('app_slug') || '').trim();
    const returnTo = (params.get('return_to') || '').trim();
    const flash = document.getElementById('flash');
    const show = (text, error = false) => {
      flash.textContent = text;
      flash.className = `flash${error ? ' error' : ''}`;
      flash.style.display = 'block';
    };
    const loginLink = new URL('/login', location.origin);
    if (appSlug) loginLink.searchParams.set('app_slug', appSlug);
    if (returnTo) loginLink.searchParams.set('return_to', returnTo);
    document.getElementById('loginLink').href = `${loginLink.pathname}${loginLink.search}${loginLink.hash}`;
    document.getElementById('submitBtn').onclick = async () => {
      try {
        const res = await fetch('/api/auth/password/forgot', {
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify({
            email: document.getElementById('email').value.trim(),
            app_slug: appSlug,
            return_to: returnTo,
          })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.detail || '发送失败');
        show(data.message || '已发送');
      } catch (err) {
        show(err.message || '发送失败', true);
      }
    };
  </script>
</body>
</html>
