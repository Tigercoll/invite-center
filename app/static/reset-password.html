<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Invite Center - 重置密码</title>
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <main class="auth-shell">
    <section class="auth-card">
      <div class="title">重置密码</div>
      <div class="sub">设置新密码后会自动登录。</div>
      <div id="flash" class="flash"></div>
      <div class="grid">
        <div class="row">
          <label>邮箱</label>
          <input id="email" disabled />
        </div>
        <div class="row">
          <label>新密码</label>
          <input id="password" type="password" placeholder="至少 8 位" />
        </div>
        <button id="submitBtn">重置并登录</button>
      </div>
      <div class="sub" style="margin-top:14px">
        <a class="link" id="loginLink" href="/login">返回登录</a>
      </div>
    </section>
  </main>
  <script>
    const token = new URLSearchParams(location.search).get('token') || '';
    const params = new URLSearchParams(location.search);
    const appSlug = (params.get('app_slug') || '').trim();
    const flash = document.getElementById('flash');
    const show = (text, error = false) => {
      flash.textContent = text;
      flash.className = `flash${error ? ' error' : ''}`;
      flash.style.display = 'block';
    };
    const nextAfterAuth = () => {
      if (appSlug) {
        const next = new URL('/launch', location.origin);
        next.searchParams.set('app_slug', appSlug);
        return `${next.pathname}${next.search}${next.hash}`;
      }
      return '/admin';
    };
    const loginLink = new URL('/login', location.origin);
    if (appSlug) loginLink.searchParams.set('app_slug', appSlug);
    document.getElementById('loginLink').href = `${loginLink.pathname}${loginLink.search}${loginLink.hash}`;
    async function init(){
      const res = await fetch(`/api/auth/password/reset/verify?token=${encodeURIComponent(token)}`);
      const data = await res.json().catch(() => ({}));
      if (!res.ok) throw new Error(data.detail || '重置链接无效');
      document.getElementById('email').value = data.email;
    }
    document.getElementById('submitBtn').onclick = async () => {
      try {
        const res = await fetch('/api/auth/password/reset', {
          method:'POST',
          headers:{'Content-Type':'application/json'},
          body: JSON.stringify({token, password: document.getElementById('password').value})
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.detail || '重置失败');
        location.href = nextAfterAuth();
      } catch (err) {
        show(err.message || '重置失败', true);
      }
    };
    init().catch(err => show(err.message || '重置链接无效', true));
  </script>
</body>
</html>
